name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run gitleaks
        run: pre-commit run --all-files --show-diff-on-failure

  notify-failure:
    runs-on: ubuntu-latest
    needs: [lint, gitleaks]
    if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Notify Telegram
        env:
          TOKEN: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          TEXT="[CI FAIL] ${GITHUB_REPOSITORY} (${GITHUB_WORKFLOW})
          Commit: ${GITHUB_SHA:0:7} - ${FIRST_LINE}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
